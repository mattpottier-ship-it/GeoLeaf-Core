<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>GeoLeaf – Official Demo</title>
        <link rel="icon" type="image/x-icon" href="src/assets/icons/fav.png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Cache headers managed by server in production -->

        <!-- Security Headers -->
        <meta http-equiv="Content-Security-Policy"
            content="default-src 'self';
                    script-src 'self' https://unpkg.com blob: 'sha256-vvt4KWwuNr51XfE5m+hzeNEGhiOfZzG97ccfqGsPwvE=';
                    style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com;
                    img-src 'self' data: https:;
                    connect-src 'self' https:;
                    font-src 'self' data: https://fonts.gstatic.com;
                    worker-src 'self' blob:;
                    child-src blob:;
                    object-src 'none';
                    base-uri 'self';
                    form-action 'self';
                    upgrade-insecure-requests;">

        <meta http-equiv="X-Content-Type-Options" content="nosniff">
        <meta name="referrer" content="strict-origin-when-cross-origin">

        <!-- Google Fonts - Open Sans -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

        <!-- Leaflet CSS -->
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
        />

        <!-- GeoLeaf CSS (core package) -->
        <link rel="stylesheet" href="src/css/geoleaf-main.css" />
    </head>
    <body class="gl-theme-dark">
        <!-- Spinner CSS — hidden automatically by GeoLeaf.boot() via geoleaf:map:ready -->
        <div id="gl-loader"></div>

        <div class="gl-page">

            <!-- DEMO ONLY — Remove this container for production projects -->
            <div id="demo-header-container"></div>

            <!-- Contenu principal -->
            <main class="gl-main">
                <!-- Toggle Dark/Light (always present, top right of the map) -->
                <button class="gl-theme-toggle gl-theme-toggle--map" data-gl-role="theme-toggle" title="Toggle light/dark theme">
                    <span class="gl-theme-toggle__thumb"></span>
                </button>

                <!-- Filter panel toggle button -->
                <button id="gl-filter-toggle"
                        class="gl-filter-toggle"
                        data-gl-role="filter-toggle"
                        aria-label="Open filter panel"
                        title="Filters">
                    <span class="gl-filter-toggle__icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 6l6 6-6 6"></path>
                    </svg>
                    </span>
                </button>

                <!-- Side filter panel -->
                <aside id="gl-filter-panel" class="gl-filter-panel" role="complementary" aria-label="Filter panel">
                    <!-- Content will be dynamically generated by GeoLeaf.UI.buildFilterPanelFromActiveProfile() -->
                </aside>

                <!-- Containers for the theme selector -->
                <div id="gl-theme-primary-container"></div>
                <div id="gl-theme-secondary-container"></div>

                <!-- Carte Leaflet -->
                <div id="geoleaf-map" class="gl-map"></div>
            </main>

        </div>

        <!-- Leaflet JS -->
        <script
            src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""
        ></script>

        <!-- Clustering optionnel (MarkerCluster) -->
        <script
            src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
            integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr"
            crossorigin="anonymous"
        ></script>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
            integrity="sha384-pmjIAcz2bAn0xukfxADbZIb3t8oRT9Sv0rvO+BR5Csr6Dhqq+nZs59P0pPKQJkEV"
            crossorigin="anonymous"
        />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
            integrity="sha384-wgw+aLYNQ7dlhK47ZPK7FRACiq7ROZwgFNg0m04avm4CaXS+Z9Y7nMu8yNjBKYC+"
            crossorigin="anonymous"
        />

        <!-- MapLibre GL JS (basemaps vectorielles WebGL) -->
        <link
            href="https://unpkg.com/maplibre-gl@5.18.0/dist/maplibre-gl.css"
            rel="stylesheet"
            integrity="sha384-q7EDwLXBfakVimqzBJqFCTxpgy7B18buhebV158qkVMCEVAaUnU3fQTEfWgYz+7g"
            crossorigin="anonymous"
        />
        <script
            src="https://unpkg.com/maplibre-gl@5.18.0/dist/maplibre-gl.js"
            integrity="sha384-MYTfGytf3SxNyO7ZAu/U0wHCcs3NpqE92Q3wBz5PQhat8kEA/wbwb9qY6H/JLyuR"
            crossorigin="anonymous"
        ></script>
        <!-- MapLibre GL Leaflet binding -->
        <script
            src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.1.3/leaflet-maplibre-gl.js"
            integrity="sha384-LIxE/QjpJKC2A91yD40ZisdYtFbgAjl58jqpo9/MUZNgwhqsTfzwrTlqv6nDdzzB"
            crossorigin="anonymous"
        ></script>

        <!-- GeoLeaf JS - Bundle core -->
        <script src="dist/geoleaf.umd.js"></script>

        <!-- Optional plugins (ESM — load BEFORE GeoLeaf.boot()) — DEMO ONLY: remove if unused -->
        <script type="module" src="dist/geoleaf-storage.plugin.js"></script>
        <script type="module" src="dist/geoleaf-addpoi.plugin.js"></script>

        <!-- DEMO ONLY — Remove this script for production projects -->
        <script src="demo/demo.extensions.js"></script>

        <!-- Init: header loading + GeoLeaf bootstrap (external for CSP) -->
        <!-- DEMO ONLY: replace with your own init script -->
        <script src="init.js"></script>
    </body>
</html>
